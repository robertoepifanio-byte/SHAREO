name: Deploy - ShareO

on:
  # Preview deploy: dispara em qualquer PR aberto contra main
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

  # Staging deploy (automático) e Production deploy (com aprovação):
  # ambos disparam em push na main OU em tags de release
  push:
    branches: [main]
    tags:
      - "v*"

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "11"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Preview Deploy — para cada PR
  # Gera uma URL de preview exclusiva para revisão visual antes do merge
  # ─────────────────────────────────────────────────────────────────
  preview:
    name: Preview Deploy (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.preview-url }}
    permissions:
      pull-requests: write  # para comentar a URL no PR
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@54.6.1

      - name: Pull Vercel project config (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project (preview)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_STAGING }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_STAGING }}

      - name: Deploy preview to Vercel
        id: deploy
        run: |
          PREVIEW_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview-url }}';
            const body = [
              '### Preview Deploy',
              '',
              'URL de preview gerada para este PR:',
              '',
              `**${url}**`,
              '',
              '_Valide as mudancas antes de aprovar o merge._'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Staging Deploy — automático após merge na main
  # Deploy no ambiente staging para validação pelo QA e ProductOwner
  # ─────────────────────────────────────────────────────────────────
  staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      STAGING_URL: ${{ secrets.STAGING_URL }}
    environment:
      name: staging
      url: ${{ env.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel@54.6.1

      - name: Pull Vercel project config (production = staging estável)
        # shareo-rouge.vercel.app é a URL estável usada pelos testers.
        # Deploy com --prod atualiza essa URL a cada push na main.
        # Produção real será um projeto/domínio separado quando necessário.
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project (staging)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_STAGING }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_STAGING }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SKIP_RATE_LIMIT: "true"

      - name: Deploy to staging (--prod → atualiza shareo-rouge.vercel.app)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy-url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Resolve failed migrations on staging
        run: |
          pnpm prisma migrate resolve --applied 20260531000000_add_referral_fields 2>&1 || true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
          DIRECT_URL: ${{ secrets.DIRECT_URL_STAGING }}

      - name: Run DB migrations on staging
        run: pnpm prisma generate && pnpm db:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
          DIRECT_URL: ${{ secrets.DIRECT_URL_STAGING }}

      - name: Seed staging DB (categorias + dados base)
        run: pnpm db:seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
          DIRECT_URL: ${{ secrets.DIRECT_URL_STAGING }}
          NODE_ENV: staging

      - name: Post-deploy health check (staging)
        run: |
          echo "Aguardando 20s para o deploy propagar..."
          sleep 20
          # URL estável — atualizada pelo --prod acima
          DEPLOY_URL="https://shareo-rouge.vercel.app"
          echo "Verificando: $DEPLOY_URL/api/health"
          RESPONSE=$(curl -s "$DEPLOY_URL/api/health")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/api/health")
          echo "Status HTTP: $STATUS"
          echo "Response: $RESPONSE"
          if [ "$STATUS" != "200" ]; then
            echo "Health check falhou com status $STATUS"
            exit 1
          fi
          echo "Health check OK: $STATUS"

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: E2E Staging — regressão contínua após cada deploy na main
  # Roda os 12 specs Playwright contra shareo-rouge.vercel.app
  # ─────────────────────────────────────────────────────────────────
  e2e-staging:
    name: E2E Regressão Contínua (Staging)
    runs-on: ubuntu-latest
    needs: [staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      STAGING_URL: ${{ secrets.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (Chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E suite against staging
        run: |
          pnpm playwright test \
            e2e/e2e-plan.spec.ts \
            e2e/e2e-auth-plan.spec.ts \
            e2e/e2e-share-plan.spec.ts \
            e2e/e2e-suite.spec.ts \
            e2e/e2e-a11y-plan.spec.ts \
            e2e/e2e-crossbrowser-plan.spec.ts \
            e2e/e2e-performance-plan.spec.ts \
            e2e/e2e-home-plan.spec.ts \
            e2e/e2e-security-plan.spec.ts \
            e2e/e2e-usability-plan.spec.ts \
            e2e/e2e-integration-plan.spec.ts \
            e2e/e2e-governance-plan.spec.ts \
            --config=playwright.staging.config.ts --workers=1
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}

      - name: Upload E2E reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-staging-reports-${{ github.sha }}
          path: |
            e2e-*-report.json
            playwright-report-staging/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # JOB 4: Production Deploy — somente via tag de release (v*)
  # Staging deve ser validado antes de promover para produção.
  # Para fazer deploy: git tag v1.0.0 && git push origin v1.0.0
  # Requer aprovação no ambiente "production" do GitHub (Required reviewers)
  # ─────────────────────────────────────────────────────────────────
  production:
    name: Deploy Production
    runs-on: ubuntu-latest
    # Dispara APENAS em tags de release (v*) — nunca em push direto na main
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://www.shareo.com.br
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel@54.6.1

      - name: Pull Vercel project config (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_PROD }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_PROD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Run DB migrations on production
        continue-on-error: true
        run: pnpm prisma generate && pnpm db:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          DIRECT_URL: ${{ secrets.DIRECT_URL_PROD }}

      # Monitorar após deploy — falha dispara rollback manual via Vercel Dashboard
      # continue-on-error: remover quando domínio www.shareo.com.br estiver apontado para Vercel
      - name: Post-deploy health check
        continue-on-error: true
        run: |
          echo "Aguardando 30s para o deploy propagar..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.shareo.com.br/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check falhou com status $STATUS — verifique o Vercel Dashboard para rollback"
            exit 1
          fi
          echo "Health check OK: $STATUS"
